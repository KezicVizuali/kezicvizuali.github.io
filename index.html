<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="description" content="Krunoslav Kezić - Kreativni vizuali i izrada ultra-brzih web stranica bez mjesečnih troškova hostinga.">
<meta name="keywords" content="izrada web stranica, web development, fotografija, vizuali, profesionalni web, Kezić Vizuali">
<meta property="og:title" content="Kezić Vizuali - Kreativni Studio">
<meta property="og:description" content="Izrada modernih web stranica i vrhunski vizualni sadržaj.">
<meta property="og:image" content="https://kezicvizuali.github.io/logo-za-share.jpg">
<meta property="og:url" content="https://kezicvizuali.github.io/">
<meta property="og:type" content="website">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kezić Vizuali – Kreativni Studio, Velika Gorica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: rgba(201,168,76,0.15);
    --bg: #0c0c0b;
    --bg2: #131310;
    --bg3: #1a1a16;
    --text: #f0ead8;
    --text-muted: #9a9080;
    --border: rgba(201,168,76,0.18);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 16px; line-height: 1.7; font-weight: 300; overflow-x: hidden; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 68px; background: rgba(12,12,11,0.92); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: var(--serif); font-size: 1.35rem; font-weight: 600; letter-spacing: 0.04em; color: var(--gold); text-decoration: none; display: flex; align-items: center; gap: 0.6rem; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.82rem; letter-spacing: 0.12em; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover { color: var(--gold); }
  .nav-cta { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 0.45rem 1.2rem; font-family: var(--sans); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; text-decoration: none; transition: background 0.2s, color 0.2s; }
  .nav-cta:hover { background: var(--gold); color: #0c0c0b; }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
  .hamburger span { display: block; width: 24px; height: 1.5px; background: var(--text); transition: 0.3s; }
  #hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 5% 8%; position: relative; overflow: hidden; background-attachment: fixed; background-position: center; }
  .hero-bg { position: absolute; inset: 0; z-index: 0; background: radial-gradient(ellipse 70% 60% at 75% 40%, rgba(201,168,76,0.07) 0%, transparent 70%), radial-gradient(ellipse 50% 80% at 10% 80%, rgba(201,168,76,0.04) 0%, transparent 60%), linear-gradient(160deg, #0c0c0b 0%, #141410 50%, #0c0c0b 100%); }
  .hero-grid { position: absolute; inset: 0; z-index: 0; opacity: 0.04; background-image: linear-gradient(var(--gold) 1px, transparent 1px), linear-gradient(90deg, var(--gold) 1px, transparent 1px); background-size: 80px 80px; }
  .hero-content { position: relative; z-index: 1; max-width: 900px; }
  .hero-title { font-family: var(--serif); font-size: clamp(2.8rem, 6vw, 5.5rem); font-weight: 300; line-height: 1.05; letter-spacing: -0.01em; margin-bottom: 1.5rem; }
  .hero-title em { font-style: italic; color: var(--gold); }
  .btn-primary { background: var(--gold); color: #0c0c0b; border: none; padding: 0.85rem 2rem; font-family: var(--sans); font-size: 0.82rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; cursor: pointer; text-decoration: none; transition: background 0.2s, transform 0.15s; display: inline-block; }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
  section { padding: 7rem 5%; }
  .reveal { opacity: 0; transform: translateY(40px) scale(0.98); transition: opacity 1.2s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .reveal.visible { opacity: 1; transform: translateY(0) scale(1); }
  @media (max-width: 900px) { .nav-links { position: fixed; top: 68px; left: 0; right: 0; background: rgba(12,12,11,0.98); flex-direction: column; gap: 0; padding: 0; border-bottom: 1px solid var(--border); clip-path: polygon(0 0, 100% 0, 100% 0, 0 0); transition: clip-path 0.4s ease; } .nav-links.open { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); } .nav-links a { display: block; padding: 1.5rem 5%; text-align: center; } .nav-cta { display: none; } .hamburger { display: flex; } }
</style>
</head>
<body>
  <nav>
    <a href="#" class="nav-logo">
      <img src="Kezić vizuali transparent xl.png" alt="Kezić Vizuali Logo" style="height: 120px; width: auto; object-fit: contain; display: block;">
    </a>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    <ul class="nav-links" id="nav-links">
      <li><a href="#o-meni">O nama</a></li>
      <li><a href="#cjenik">Usluge i Cjenik</a></li>
      <li><a href="#kontakt">Kontakt</a></li>
    </ul>
    <a href="#kontakt" class="nav-cta">Zatraži Ponudu</a>
  </nav>

  <header id="hero">
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>
    <div class="hero-content reveal">
      <h1 class="hero-title">Vizuali koji <em>pričaju priču</em> vašeg brenda.</h1>
      <div class="hero-btns">
        <a href="#cjenik" class="btn-primary">Istraži Usluge</a>
      </div>
    </div>
  </header>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');
    hamburger.addEventListener('click', () => { navLinks.classList.toggle('open'); });
    const revealEls = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('visible'); } });
    }, { threshold: 0.1 });
    revealEls.forEach(el => observer.observe(el));
  </script>
</body>
</html>
